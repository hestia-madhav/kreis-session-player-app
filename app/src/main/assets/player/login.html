<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMCA Sessions — Login</title>
  <link rel="stylesheet" href="css/fonts.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: radial-gradient(800px 500px at 50% 20%, rgba(243,156,31,0.12), transparent 60%), #FFFBF2;
      font-family: "Inter", "Noto Sans Kannada", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1F2937;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 18px; padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 380px;
      margin: 1rem;
    }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
    .logo-row img { height: 48px; width: auto; }
    .logo-row .sep { border-left: 1px solid #E5E7EB; height: 36px; }
    h1 { text-align: center; font-size: 1.5rem; font-weight: 800; color: #1E293B; margin: 0 0 0.25rem; }
    .sub { text-align: center; font-size: 0.9rem; color: #6B7280; margin: 0 0 2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; }
    input {
      width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid #D1D5DB; border-radius: 10px;
      font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.15s;
      margin-bottom: 1rem; background: #FAFAFA;
    }
    input:focus { border-color: #F39C1F; background: #fff; }
    .btn {
      width: 100%; padding: 0.8rem; border: none; border-radius: 10px;
      background: #F39C1F; color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn:hover { background: #D48A1A; }
    .btn:disabled { background: #D1D5DB; cursor: not-allowed; }
    .error { color: #DC2626; font-size: 0.85rem; text-align: center; margin-top: 0.75rem; display: none; }
    .footer { text-align: center; font-size: 0.75rem; color: #9CA3AF; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-row">
      <img src="sessions/assets/kreis_logo.png" alt="KREIS" onerror="this.style.display='none'" />
      <div class="sep"></div>
      <img src="sessions/assets/cmca_logo.png" alt="CMCA" onerror="this.style.display='none'" />
    </div>
    <h1>CMCA Sessions</h1>
    <p class="sub">Sign in to access sessions</p>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <label for="userId">User ID</label>
      <input type="text" id="userId" autocomplete="username" autocapitalize="off" required />

      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required />

      <button type="submit" class="btn" id="loginBtn">Sign In</button>
      <div class="error" id="errorMsg">Invalid user ID or password</div>
    </form>

    <div class="footer">CMCA India</div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var userId = document.getElementById("userId").value.trim();
      var password = document.getElementById("password").value;
      var errEl = document.getElementById("errorMsg");
      var btn = document.getElementById("loginBtn");

      if (!userId || !password) return false;

      btn.disabled = true;
      btn.textContent = "Signing in…";
      errEl.style.display = "none";

      if (window.Android) {
        var ok = Android.login(userId, password);
        if (ok) {
          window.location.href = "index.html";
        } else {
          errEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      } else {
        // Non-APK fallback — skip auth
        window.location.href = "index.html";
      }
      return false;
    }
  </script>
</body>
</html>
