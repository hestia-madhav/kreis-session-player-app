<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMCA Session Player</title>
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/player.css" />
  <style>
    body { margin: 0; padding: 0; background: #FFFBF2; overflow: hidden; }
    .sr-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      font-family: "Inter", sans-serif; color: #5A3800;
    }
    .sr-loading-spinner {
      width: 48px; height: 48px; border: 4px solid #FFE7C2;
      border-top-color: #F39C1F; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sr-loading" id="loading">
    <div class="sr-loading-spinner"></div>
    <div>Loading session…</div>
  </div>

  <script src="js/player.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id") || "kreis-session-1";
      var loaded = 0;
      var expected = 2;

      function check() {
        loaded++;
        if (loaded >= expected) {
          var el = document.getElementById("loading");
          if (el) el.remove();
          SessionPlayer.init(id);
        }
      }

      function loadScript(src) {
        var s = document.createElement("script");
        s.src = src;
        s.onload = check;
        s.onerror = check;
        document.head.appendChild(s);
      }

      loadScript("/sessions/" + id + "/data/" + id + ".en.js");
      loadScript("/sessions/" + id + "/data/" + id + ".kn.js");
    })();
  </script>
</body>
</html>
